<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PLEG Phase 2 · Editable UX Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f8fb;--card:#fff;--text:#172033;--muted:#667085;--soft:#f2f4f7;--line:#e6e9ef;--line2:#cbd5e1;--blue:#2563eb;--blue2:#1d4ed8;--blue-bg:#eff6ff;--green:#059669;--green-bg:#ecfdf5;--amber:#d97706;--amber-bg:#fffbeb;--red:#dc2626;--red-bg:#fef2f2;--shadow:0 10px 28px rgba(16,24,40,.07);--r:16px}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}button,input,select,textarea{font:inherit}button{user-select:none}.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}.side{background:#fff;border-right:1px solid var(--line);padding:18px;position:sticky;top:0;height:100vh}.brand{display:flex;align-items:center;gap:10px;margin-bottom:26px}.logo{width:38px;height:38px;border-radius:12px;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:800}.brand b{font-size:16px}.brand small{display:block;color:var(--muted);font-size:12px;margin-top:2px}.nav-label{font-size:11px;color:#98a2b3;text-transform:uppercase;font-weight:800;letter-spacing:.08em;margin:20px 8px 8px}.nav button{width:100%;border:0;background:transparent;border-radius:12px;padding:11px 12px;text-align:left;color:#485467;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center}.nav button:hover{background:var(--soft);color:var(--text)}.nav button.active{background:var(--blue-bg);color:var(--blue)}.badge{font-size:11px;background:#fee2e2;color:var(--red);border-radius:999px;padding:2px 8px}.role{position:absolute;bottom:18px;left:18px;right:18px}.role select{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;color:var(--text)}.main{min-width:0}.top{min-height:72px;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:12px 28px;position:sticky;top:0;z-index:10}.title h1{font-size:22px;margin:0;letter-spacing:-.03em}.title p{font-size:13px;color:var(--muted);margin:3px 0 0}.top-actions{display:flex;gap:10px;align-items:center}.search{width:260px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px 12px}.btn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:12px;padding:10px 14px;cursor:pointer;font-weight:800}.btn:hover{box-shadow:var(--shadow);border-color:var(--line2)}.btn.primary{background:var(--blue);color:white;border-color:var(--blue)}.btn.primary:hover{background:var(--blue2)}.btn.ghost{background:transparent}.btn.danger{color:var(--red);border-color:#fecaca;background:#fff}.btn.small{padding:7px 10px;font-size:12px;border-radius:10px}.content{padding:28px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}.kpi small{color:var(--muted);font-weight:800;text-transform:uppercase;font-size:11px}.kpi h2{font-size:30px;margin:8px 0 3px;letter-spacing:-.04em}.kpi p{color:var(--muted);font-size:13px;margin:0}.grid-2{display:grid;grid-template-columns:1.35fr .85fr;gap:18px}.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}.head h3{margin:0;font-size:17px}.head p{margin:4px 0 0;color:var(--muted);font-size:13px}.muted{color:var(--muted)}table{width:100%;border-collapse:collapse}th{font-size:11px;text-align:left;color:#98a2b3;text-transform:uppercase;letter-spacing:.06em;padding:10px}td{border-top:1px solid var(--line);padding:13px 10px;font-size:13px;color:var(--muted)}td b{color:var(--text)}tr:hover td{background:#f9fafb}.pill{border-radius:999px;padding:5px 10px;font-weight:800;font-size:12px;display:inline-block;white-space:nowrap}.Mature{background:var(--blue-bg);color:var(--blue)}.Decline,.Discontinued,.Liquidation{background:var(--amber-bg);color:var(--amber)}.Obsolete{background:var(--red-bg);color:var(--red)}.New,.MTO{background:var(--green-bg);color:var(--green)}.bar{height:8px;background:#eef2f7;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--blue);border-radius:999px;transition:.2s}.actions-list{display:grid;gap:10px}.action{display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;transition:.15s}.action:hover{border-color:#cbd5e1;box-shadow:var(--shadow)}.check{width:24px;height:24px;border-radius:7px;border:1.5px solid #cbd5e1;display:grid;place-items:center;cursor:pointer;color:white;font-weight:900;flex:0 0 auto}.check.done{background:var(--green);border-color:var(--green)}.action b{font-size:13px}.action p{margin:3px 0 0;color:var(--muted);font-size:12px}.due{font-size:12px;color:var(--muted);white-space:nowrap}.workflow{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.step{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;min-height:122px}.step b{display:block;font-size:14px;margin-bottom:8px}.step small{color:var(--muted);line-height:1.45}.step.active{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-bg)}.drawer-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.36);z-index:30}.drawer{position:fixed;right:0;top:0;height:100vh;width:min(620px,100%);background:#fff;z-index:40;transform:translateX(100%);transition:.22s;border-left:1px solid var(--line);box-shadow:-24px 0 50px rgba(0,0,0,.15);display:flex;flex-direction:column}.drawer.open{transform:translateX(0)}.drawer-head{padding:22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px}.drawer-body{padding:18px 22px 24px;overflow:auto;flex:1}.x{border:0;background:#f3f4f6;border-radius:10px;width:36px;height:36px;cursor:pointer;font-weight:900}.modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.46);z-index:50;align-items:center;justify-content:center;padding:20px}.modal-card{background:#fff;border-radius:20px;width:min(780px,100%);box-shadow:0 30px 90px rgba(0,0,0,.25);padding:22px}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field label{font-size:12px;font-weight:800;color:var(--muted);display:block;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;background:#fff}.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid #dbeafe;border-color:var(--blue)}.field.full{grid-column:1/-1}.note{background:var(--blue-bg);border:1px solid #dbeafe;color:#1e40af;border-radius:14px;padding:12px;font-size:13px;margin:14px 0}.field-grid{display:grid;gap:10px}.sap-row,.edit-row{display:grid;grid-template-columns:1fr 1.4fr auto;gap:10px;align-items:center;border-top:1px solid var(--line);padding:10px 0}.sap-row:first-child,.edit-row:first-child{border-top:0}.sap-row span,.edit-row span{color:var(--muted);font-size:13px}.sap-row select,.sap-row input,.edit-row input,.edit-row select{border:1px solid var(--line);border-radius:12px;padding:9px;background:#fff;font-weight:700;color:var(--text)}.progress-wrap{margin:10px 0 12px}.comment-box{border:1px solid var(--line);border-radius:14px;padding:12px;background:#f9fafb;margin-top:10px}.comment-box b{font-size:13px}.comment-box p{margin:4px 0 0;color:var(--muted);font-size:12px}.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.drawer-foot{background:#fff;border-top:1px solid var(--line);padding:14px 22px;display:flex;gap:10px;align-items:center;justify-content:space-between}.foot-left,.foot-right{display:flex;gap:10px;align-items:center}.toast{position:fixed;right:22px;bottom:22px;background:#fff;border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:14px;padding:13px 16px;box-shadow:var(--shadow);display:none;z-index:80}.status-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:7px}.dirty{color:var(--amber);font-weight:800;font-size:12px}.readonly-tip{font-size:12px;color:var(--muted);padding:8px 10px;background:#f9fafb;border:1px solid var(--line);border-radius:10px}.empty{padding:20px;text-align:center;color:var(--muted);border:1px dashed var(--line2);border-radius:14px;background:#fafafa}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}.tab{border:1px solid var(--line);background:#fff;color:#485467;border-radius:999px;padding:8px 12px;font-weight:800;font-size:12px;cursor:pointer}.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
@media(max-width:1000px){.app{grid-template-columns:1fr}.side{display:none}.kpis{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}.workflow{grid-template-columns:1fr 1fr}.search{width:180px}}@media(max-width:650px){.top{height:auto;align-items:flex-start;flex-direction:column;padding:16px}.top-actions{width:100%;flex-wrap:wrap}.search{width:100%}.content{padding:16px}.kpis,.form,.workflow{grid-template-columns:1fr}.action{grid-template-columns:auto 1fr auto}.action .btn{grid-column:2/4}.drawer-foot{flex-direction:column;align-items:stretch}.foot-left,.foot-right{width:100%;justify-content:space-between}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">P</div><div><b>PLEG Phase 2</b><small>Clean editable PLC workflow</small></div></div>
    <nav class="nav" id="nav">
      <div class="nav-label">Main</div>
      <button class="active" data-page="dashboard">Dashboard</button>
      <button data-page="workflow">Workflow <span class="badge" id="workflowBadge">6</span></button>
      <button data-page="portfolio">Materials</button>
      <button data-page="actions">My Actions <span class="badge" id="actionBadge">4</span></button>
      <div class="nav-label">Support</div>
      <button data-page="impact">Impact Review</button>
      <button data-page="audit">Audit Trail</button>
    </nav>
    <div class="role"><select id="role"><option>Product Manager</option><option>Supply Chain</option><option>Manufacturing</option><option>Sales</option><option>Pricing</option><option>Finance</option><option>MDM</option><option>Executive</option></select></div>
  </aside>
  <main class="main">
    <header class="top">
      <div class="title"><h1 id="pageTitle">Dashboard</h1><p id="pageSub">Only the information users need to make PLC decisions.</p></div>
      <div class="top-actions"><input class="search" id="search" placeholder="Search material or LCR…"><button class="btn" onclick="showPage('actions')">My Actions</button><button class="btn primary" onclick="openLCR()">+ New LCR</button></div>
    </header>
    <section class="content" id="content"></section>
  </main>
</div>
<div class="drawer-bg" id="bg" onclick="attemptCloseDrawer()"></div>
<aside class="drawer" id="drawer"></aside>
<div class="modal" id="modal"></div>
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
const initial={materials:[
{id:'ES-22019',desc:'Industrial EP connector assembly',stage:'Mature',plant:'0204',abc:'Blank',mrp:'OBS',type:'ND',salesBlock:'Z3',mrpBlock:'Z2',inv:228000,risk:82,customers:18,trend:-22,owner:'Sarah P.'},
{id:'EP-72110',desc:'Legacy ES cable harness',stage:'Discontinued',plant:'0121',abc:'Blank',mrp:'DIS',type:'RP',salesBlock:'Z3',mrpBlock:'Z1',inv:74000,risk:67,customers:9,trend:-16,owner:'Mark L.'},
{id:'EP-10482',desc:'New MTS motor component',stage:'New',plant:'0301',abc:'C',mrp:'NEW',type:'PD',salesBlock:'Blank',mrpBlock:'Blank',inv:18000,risk:24,customers:4,trend:18,owner:'Ana R.'},
{id:'ES-55120',desc:'MTO custom panel',stage:'MTO',plant:'0204',abc:'D',mrp:'MTO',type:'PD',salesBlock:'Blank',mrpBlock:'Blank',inv:0,risk:12,customers:2,trend:4,owner:'David N.'}
],tasks:[
{id:1,dept:'Supply Chain',task:'Confirm remaining inventory and replenishment plan',mat:'ES-22019',due:'Jun 12',done:true},
{id:2,dept:'Manufacturing',task:'Review open production orders before decline',mat:'ES-22019',due:'Jun 13',done:true},
{id:3,dept:'Sales',task:'Notify active customers and identify replacement',mat:'ES-22019',due:'Jun 15',done:true},
{id:4,dept:'Pricing',task:'Create liquidation pricing proposal',mat:'EP-72110',due:'Jun 16',done:false},
{id:5,dept:'MDM',task:'Validate SAP MRP Controller and MRP Type',mat:'EP-72110',due:'Jun 17',done:false}
],requests:[
{id:'LCR-1024',mat:'ES-22019',from:'Mature',to:'Decline',status:'Impact Review',progress:60,due:'Jun 14'},
{id:'LCR-1025',mat:'EP-72110',from:'Discontinued',to:'Obsolete',status:'MDM Update',progress:82,due:'Jun 18'},
{id:'LCR-1026',mat:'EP-10482',from:'Mature',to:'Decline',status:'Draft',progress:10,due:'New'}
],comments:{'ES-22019':[{user:'Sarah P.',text:'Need final customer list before customer notification goes out.',time:'Yesterday'}]},audit:[
{time:'Today 9:14',user:'Sarah P.',action:'Created LCR',object:'LCR-1024'},
{time:'Today 10:02',user:'Supply Chain',action:'Confirmed inventory exposure',object:'ES-22019'},
{time:'Today 11:36',user:'Manufacturing',action:'Completed production order review',object:'ES-22019'},
{time:'Yesterday',user:'MDM',action:'Validated MRP Controller OBS',object:'EP-72110'}]};
let data=JSON.parse(localStorage.getItem('plegEditable')||'null')||structuredClone(initial);
let currentPage='dashboard', currentMaterial=null, dirty=false, draft=null;
function save(){localStorage.setItem('plegEditable',JSON.stringify(data));refreshBadges()}
function resetDemo(){if(confirm('Reset all demo edits?')){localStorage.removeItem('plegEditable');data=structuredClone(initial);toast('Demo reset');closeDrawer(true);showPage(currentPage)}}
function money(n){return '$'+Number(n).toLocaleString()}
function pill(s){return `<span class="pill ${s}">${s}</span>`}
function mat(id){return data.materials.find(m=>m.id===id)}
function refreshBadges(){let open=data.tasks.filter(t=>!t.done).length;$('actionBadge').textContent=open;$('workflowBadge').textContent=data.requests.length}
function log(action,obj){data.audit.unshift({time:'Just now',user:$('role').value,action,object:obj});save()}
function showPage(page){currentPage=page;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));let titles={dashboard:['Dashboard','Only the information users need to make PLC decisions.'],workflow:['Workflow','Lean 5-step lifecycle transition process.'],portfolio:['Materials','SAP-aligned material portfolio.'],actions:['My Actions','Editable actions by role.'],impact:['Impact Review','Simple decision summary before approval.'],audit:['Audit Trail','Who changed what and when.']}; $('pageTitle').textContent=titles[page][0];$('pageSub').textContent=titles[page][1]; ({dashboard,workflow,portfolio,actions,impact,audit}[page])()}
function dashboard(){let high=data.materials.filter(m=>m.risk>60).length,inv=data.materials.reduce((a,b)=>a+b.inv,0),open=data.requests.length; $('content').innerHTML=`<div class="kpis"><div class="card kpi"><small>Open LCRs</small><h2>${open}</h2><p>Requests in workflow</p></div><div class="card kpi"><small>High Risk</small><h2>${high}</h2><p>Materials need review</p></div><div class="card kpi"><small>Inventory Exposure</small><h2>${money(inv)}</h2><p>Across tracked materials</p></div><div class="card kpi"><small>Open Actions</small><h2>${data.tasks.filter(t=>!t.done).length}</h2><p>Waiting on owners</p></div></div><div class="grid-2"><div class="card"><div class="head"><div><h3>Priority Lifecycle Requests</h3><p>Click any row to review details.</p></div><button class="btn" onclick="showPage('workflow')">View workflow</button></div>${requestTable()}</div><div class="card"><div class="head"><div><h3>Product Manager Actions</h3><p>Complete, edit, or add tasks from the material drawer.</p></div></div><div class="actions-list">${data.tasks.slice(0,5).map((t,i)=>actionHTML(t,i)).join('')}</div></div></div>`}
function requestTable(){return `<table><thead><tr><th>LCR</th><th>Material</th><th>Move</th><th>Status</th><th>Progress</th><th>Due</th></tr></thead><tbody>${data.requests.map(r=>`<tr onclick="openMaterial('${r.mat}')"><td><b>${r.id}</b></td><td>${r.mat}</td><td>${r.from} → ${r.to}</td><td>${r.status}</td><td><div class="bar"><span style="width:${r.progress}%"></span></div></td><td>${r.due}</td></tr>`).join('')}</tbody></table>`}
function workflow(){let steps=['Request','Impact Review','Approval','SAP Update','Notify & Close']; $('content').innerHTML=`<div class="card"><div class="head"><div><h3>PLC Workflow</h3><p>Lean 5-step process. No extra complexity.</p></div><button class="btn primary" onclick="openLCR()">+ New LCR</button></div><div class="workflow">${steps.map((s,i)=>`<div class="step ${i===1?'active':''}"><b>${i+1}. ${s}</b><small>${['Product Manager submits lifecycle change.','Departments review sales, inventory, production, and finance impact.','Required owners approve or request changes.','MDM updates SAP fields and confirms status.','Sales, CS, Website, Pricing, and Ops receive final notice.'][i]}</small></div>`).join('')}</div></div><div class="card" style="margin-top:18px"><div class="head"><div><h3>Active Requests</h3><p>Track only what matters: owner, status, due date.</p></div></div>${requestTable()}</div>`}
function portfolio(q=''){let term=q||$('search')?.value||'';let list=data.materials.filter(m=>(m.id+m.desc+m.stage+m.mrp).toLowerCase().includes(term.toLowerCase())); $('content').innerHTML=`<div class="card"><div class="head"><div><h3>Material Portfolio</h3><p>SAP-aligned lifecycle status and business risk.</p></div><button class="btn" onclick="openLCR()">Create LCR</button></div><table><thead><tr><th>Material</th><th>Description</th><th>Stage</th><th>MRP Ctrl</th><th>Inventory</th><th>Risk</th><th>Owner</th></tr></thead><tbody>${list.map(m=>`<tr onclick="openMaterial('${m.id}')"><td><b>${m.id}</b></td><td>${m.desc}</td><td>${pill(m.stage)}</td><td>${m.mrp}</td><td>${money(m.inv)}</td><td>${m.risk}%</td><td>${m.owner}</td></tr>`).join('')||'<tr><td colspan="7">No material found.</td></tr>'}</tbody></table></div>`}
function actions(){let role=$('role').value; let visible=role==='Executive'?data.tasks:data.tasks.filter(t=>t.dept===role||role==='Product Manager'); $('content').innerHTML=`<div class="card"><div class="head"><div><h3>${role} Actions</h3><p>Every user sees only what they need to do.</p></div><button class="btn" onclick="openAddTask()">+ Add Action</button></div><div class="actions-list">${visible.map(t=>actionHTML(t,data.tasks.indexOf(t))).join('')||'<div class="empty">No open actions for this role.</div>'}</div></div>`}
function impact(){let m=mat('ES-22019')||data.materials[0]; $('content').innerHTML=`<div class="grid-2"><div class="card"><div class="head"><div><h3>Impact Review · ${m.id}</h3><p>Simple decision summary before approval.</p></div>${pill(m.stage)}</div><table><tbody><tr><td>Revenue Trend</td><td><b>${m.trend}%</b></td></tr><tr><td>Inventory Exposure</td><td><b>${money(m.inv)}</b></td></tr><tr><td>Active Customers</td><td><b>${m.customers}</b></td></tr><tr><td>Risk Score</td><td><b>${m.risk}%</b></td></tr><tr><td>Recommended Move</td><td><b>${m.stage} → Decline</b></td></tr></tbody></table><div style="margin-top:16px"><button class="btn primary" onclick="toast('Impact review approved')">Approve Impact</button> <button class="btn" onclick="openMaterial('${m.id}')">Open Material</button></div></div><div class="card"><h3 style="margin-top:0">Decision Guidance</h3><p class="muted" style="line-height:1.6">Move forward with decline review. Main focus should be customer communication, inventory burn-down, and manufacturing stop-production confirmation.</p><div class="note">The goal is fewer clicks, clearer ownership, and faster PLC execution.</div></div></div>`}
function audit(){ $('content').innerHTML=`<div class="card"><div class="head"><div><h3>Audit Trail</h3><p>Simple history of decisions and SAP-related changes.</p></div><button class="btn" onclick="resetDemo()">Reset demo</button></div><table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Object</th></tr></thead><tbody>${data.audit.map(a=>`<tr><td>${a.time}</td><td>${a.user}</td><td>${a.action}</td><td><b>${a.object}</b></td></tr>`).join('')}</tbody></table></div>`}
function actionHTML(t,i){return `<div class="action" onclick="openTaskEditor(${i},event)"><div class="check ${t.done?'done':''}" onclick="toggleTask(${i},event)">${t.done?'✓':''}</div><div><b>${t.task}</b><p>${t.dept} · ${t.mat}</p></div><span class="due">${t.due}</span><button class="btn small" onclick="openTaskEditor(${i},event)">Edit</button></div>`}
function toggleTask(i,e){if(e)e.stopPropagation();data.tasks[i].done=!data.tasks[i].done;log(data.tasks[i].done?'Completed task':'Reopened task',data.tasks[i].mat);toast(data.tasks[i].done?'Task completed':'Task reopened'); if(currentMaterial){openMaterial(currentMaterial,true)} else {showPage(currentPage)}}
function makeDraft(id){let m=mat(id);draft=JSON.parse(JSON.stringify(m));dirty=false}
function setDirty(){dirty=true;let el=$('dirtyFlag'); if(el) el.textContent='Unsaved changes'}
function applyDraftField(key,val){draft[key]=['inv','risk','customers','trend'].includes(key)?Number(val):val;setDirty()}
function saveDraft(){let idx=data.materials.findIndex(m=>m.id===draft.id);data.materials[idx]=structuredClone(draft);dirty=false;log('Updated material fields',draft.id);toast('Material changes saved');openMaterial(draft.id,true);showPage(currentPage)}
function discardDraft(){if(!dirty||confirm('Discard unsaved changes?')){openMaterial(currentMaterial,true)}}
function attemptCloseDrawer(){if(dirty&&!confirm('You have unsaved changes. Close anyway?'))return;closeDrawer(true)}
function openMaterial(id,keep=false){if(!keep)makeDraft(id);else makeDraft(id);currentMaterial=id;let m=draft;let related=data.tasks.map((t,i)=>({...t,i})).filter(t=>t.mat===id);let pct=related.length?Math.round(related.filter(t=>t.done).length/related.length*100):0;$('bg').style.display='block';$('drawer').classList.add('open');$('drawer').innerHTML=`<div class="drawer-head"><div style="width:100%"><div style="display:flex;justify-content:space-between;gap:10px"><div><h2 style="margin:0 0 8px">${m.id}</h2>${pill(m.stage)}</div><button class="x" onclick="attemptCloseDrawer()">×</button></div><input value="${escapeAttr(m.desc)}" oninput="applyDraftField('desc',this.value)" style="width:100%;margin-top:12px;border:1px solid var(--line);border-radius:12px;padding:10px;font-weight:700" aria-label="Material description"><div class="quick-actions"><button class="btn small" onclick="showPage('impact');closeDrawer(true)">View Impact</button><button class="btn small" onclick="toast('Replacement search started')">Find Replacement</button><span class="dirty" id="dirtyFlag"></span></div></div></div><div class="drawer-body"><div class="kpis" style="grid-template-columns:1fr 1fr"><div class="card kpi"><small>Inventory</small><h2>${money(m.inv)}</h2></div><div class="card kpi"><small>Risk</small><h2>${m.risk}%</h2></div></div><div class="card" style="box-shadow:none;margin-top:14px"><div class="head"><div><h3>Business Fields</h3><p>Edit fields directly, then save once.</p></div></div><div class="field-grid">${editRow('owner','Owner','text',m.owner)}${editRow('inv','Inventory Exposure','number',m.inv)}${editRow('risk','Risk Score','number',m.risk)}${editRow('customers','Active Customers','number',m.customers)}${editRow('trend','Revenue Trend %','number',m.trend)}</div></div><div class="card" style="box-shadow:none;margin-top:14px"><div class="head"><div><h3>SAP Fields</h3><p>Editable mock fields for workflow review before MDM update.</p></div></div><div class="field-grid">${selectRow('plant','Plant',['0121','0204','0301'])}${selectRow('abc','ABC',['Blank','A','B','C','D','S'])}${selectRow('mrp','MRP Controller',['NEW','MAT','MTO','LIQ','DIS','OBS','RAW','NSL'])}${selectRow('type','MRP Type',['PD','RP','ND'])}${selectRow('salesBlock','Sales Block',['Blank','Z2','Z3','Z4'])}${selectRow('mrpBlock','MRP Block',['Blank','Z1','Z2'])}${selectRow('stage','Lifecycle Stage',['New','MTO','Mature','Decline','Discontinued','Liquidation','Obsolete'])}</div></div><div class="card" style="box-shadow:none;margin-top:14px"><div class="head"><div><h3>Recommended Actions</h3><p>Click checkbox to complete. Click Edit to change task details.</p></div><b>${pct}%</b></div><div class="progress-wrap"><div class="bar"><span style="width:${pct}%"></span></div></div><div class="actions-list">${related.map(t=>actionHTML(t,t.i)).join('')||'<div class="empty">No actions yet. Add the first action below.</div>'}</div><div class="quick-actions"><button class="btn small" onclick="openAddTask('${id}')">+ Add Action</button><button class="btn small" onclick="notifyOwners('${id}')">Notify Owners</button></div></div><div class="card" style="box-shadow:none;margin-top:14px"><h3>Comments</h3><div id="comments-${id}">${(data.comments[id]||[]).map(c=>`<div class="comment-box"><b>${c.user}</b><p>${escapeHtml(c.text)}</p><p>${c.time}</p></div>`).join('')||'<p class="muted">No comments yet.</p>'}</div><textarea id="commentText" placeholder="Add decision note or blocker…" style="width:100%;margin-top:10px;border:1px solid var(--line);border-radius:12px;padding:11px"></textarea><div class="quick-actions"><button class="btn small" onclick="saveComment('${id}')">Post Comment</button></div></div></div><div class="drawer-foot"><div class="foot-left"><button class="btn primary" onclick="saveDraft()">Save Changes</button><button class="btn" onclick="discardDraft()">Discard</button></div><div class="foot-right"><button class="btn" onclick="openLCR('${m.id}')">Create LCR</button><button class="btn" onclick="toast('Material shared with team')">Share</button></div></div>`}
function editRow(key,label,type,val){return `<div class="edit-row"><span>${label}</span><input type="${type}" value="${escapeAttr(val)}" oninput="applyDraftField('${key}',this.value)"><span></span></div>`}
function selectRow(key,label,options){return `<div class="sap-row"><span>${label}</span><select onchange="applyDraftField('${key}',this.value)">${options.map(o=>`<option ${draft[key]===o?'selected':''}>${o}</option>`).join('')}</select><span></span></div>`}
function closeDrawer(force=false){if(!force&&dirty&&!confirm('You have unsaved changes. Close anyway?'))return;$('drawer').classList.remove('open');$('bg').style.display='none';currentMaterial=null;dirty=false;draft=null}
function openTaskEditor(i,e){if(e)e.stopPropagation();let t=data.tasks[i];$('modal').style.display='flex';$('modal').innerHTML=`<div class="modal-card"><div class="head"><div><h3>Edit Action</h3><p>Make the task clear, owned, and deadline driven.</p></div><button class="x" onclick="closeModal()">×</button></div><div class="form"><div class="field full"><label>Action</label><input id="taskName" value="${escapeAttr(t.task)}"></div><div class="field"><label>Owner Department</label><select id="taskDept">${['Product Manager','Supply Chain','Manufacturing','Sales','Pricing','Finance','MDM','Website','Customer Service'].map(d=>`<option ${t.dept===d?'selected':''}>${d}</option>`).join('')}</select></div><div class="field"><label>Due Date</label><input id="taskDue" value="${escapeAttr(t.due)}"></div><div class="field"><label>Material</label><input id="taskMat" value="${escapeAttr(t.mat)}"></div><div class="field"><label>Status</label><select id="taskDone"><option value="false" ${!t.done?'selected':''}>Open</option><option value="true" ${t.done?'selected':''}>Complete</option></select></div></div><div class="note">Producer check: each action should start with a verb, have one owner, and have one clear due date.</div><div style="display:flex;justify-content:space-between"><button class="btn danger" onclick="deleteTask(${i})">Delete</button><div><button class="btn" onclick="closeModal()">Cancel</button> <button class="btn primary" onclick="saveTask(${i})">Save Action</button></div></div></div>`}
function saveTask(i){let t=data.tasks[i];t.task=$('taskName').value.trim()||t.task;t.dept=$('taskDept').value;t.due=$('taskDue').value.trim()||'New';t.mat=$('taskMat').value.trim()||t.mat;t.done=$('taskDone').value==='true';log('Updated action',t.mat);save();closeModal();toast('Action updated'); if(currentMaterial)openMaterial(currentMaterial,true); else showPage(currentPage)}
function deleteTask(i){let obj=data.tasks[i].mat;if(confirm('Delete this action?')){data.tasks.splice(i,1);log('Deleted action',obj);save();closeModal();toast('Action deleted'); if(currentMaterial)openMaterial(currentMaterial,true); else showPage(currentPage)}}
function openAddTask(matId=''){let material=matId||currentMaterial||data.materials[0].id;$('modal').style.display='flex';$('modal').innerHTML=`<div class="modal-card"><div class="head"><div><h3>Add Action</h3><p>Create one clear task for one owner.</p></div><button class="x" onclick="closeModal()">×</button></div><div class="form"><div class="field full"><label>Action</label><input id="newTaskName" placeholder="Example: Confirm final production run date"></div><div class="field"><label>Owner Department</label><select id="newTaskDept"><option>Product Manager</option><option>Supply Chain</option><option>Manufacturing</option><option>Sales</option><option>Pricing</option><option>Finance</option><option>MDM</option><option>Website</option><option>Customer Service</option></select></div><div class="field"><label>Due Date</label><input id="newTaskDue" placeholder="Jun 20"></div><div class="field"><label>Material</label><input id="newTaskMat" value="${material}"></div></div><div class="note">Keep actions short. The drawer is designed for fast editing during PLC review meetings.</div><div style="text-align:right"><button class="btn" onclick="closeModal()">Cancel</button> <button class="btn primary" onclick="addTaskFromModal()">Add Action</button></div></div>`}
function addTaskFromModal(){let name=$('newTaskName').value.trim();if(!name){toast('Action name is required');return}let t={id:Date.now(),dept:$('newTaskDept').value,task:name,mat:$('newTaskMat').value.trim(),due:$('newTaskDue').value.trim()||'New',done:false};data.tasks.push(t);log('Added action',t.mat);save();closeModal();toast('Action added'); if(currentMaterial)openMaterial(currentMaterial,true); else showPage(currentPage)}
function notifyOwners(id){let count=data.tasks.filter(t=>t.mat===id&&!t.done).length;toast(count?`${count} open owners notified`:'No open owners to notify')}
function saveComment(id){let txt=$('commentText').value.trim();if(!txt){toast('Type a comment first');return}data.comments[id]=data.comments[id]||[];data.comments[id].unshift({user:$('role').value,text:txt,time:'Just now'});log('Added comment',id);save();toast('Comment posted');openMaterial(id,true)}
function openLCR(matId=''){$('modal').style.display='flex';$('modal').innerHTML=`<div class="modal-card"><div class="head"><div><h3>Create Lifecycle Change Request</h3><p>One clean form. Required information only.</p></div><button class="x" onclick="closeModal()">×</button></div><div class="form"><div class="field"><label>Material</label><input id="lcrMat" value="${escapeAttr(matId)}" placeholder="EP-10482"></div><div class="field"><label>Plant</label><select id="lcrPlant"><option>0121</option><option>0204</option><option>0301</option></select></div><div class="field"><label>Current Stage</label><select id="lcrFrom"><option>Mature</option><option>New</option><option>Decline</option><option>Discontinued</option><option>Obsolete</option></select></div><div class="field"><label>Proposed Stage</label><select id="lcrTo"><option>Decline</option><option>Liquidation</option><option>Obsolete</option><option>Mature</option></select></div><div class="field full"><label>Business Reason</label><textarea id="lcrReason" placeholder="Example: Sales downturn, replacement available, or inventory reduction plan."></textarea></div></div><div class="note">After submission, the system creates the impact review and department actions automatically.</div><div style="text-align:right"><button class="btn" onclick="closeModal()">Cancel</button> <button class="btn primary" onclick="submitLCR()">Submit</button></div></div>`}
function submitLCR(){let material=$('lcrMat').value.trim();if(!material){toast('Material is required');return}let id='LCR-'+(1024+data.requests.length+1);data.requests.unshift({id,mat:material,from:$('lcrFrom').value,to:$('lcrTo').value,status:'Draft',progress:10,due:'New'});['Review and confirm lifecycle decision','Validate SAP fields before update'].forEach((name,k)=>data.tasks.push({id:Date.now()+k,dept:k?'MDM':'Product Manager',task:name,mat:material,due:'New',done:false}));log('Created LCR',id);save();closeModal();toast('LCR created with starter actions');showPage('workflow')}
function closeModal(){$('modal').style.display='none'}
function toast(msg){$('toast').textContent=msg;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',2500)}
function escapeHtml(v){return String(v).replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]))}
function escapeAttr(v){return escapeHtml(v).replace(/'/g,'&#039;')}
document.querySelectorAll('.nav button[data-page]').forEach(b=>b.onclick=()=>showPage(b.dataset.page));
$('role').onchange=()=>{if(currentPage==='actions')actions();};
$('search').addEventListener('input',()=>{if(currentPage==='portfolio')portfolio($('search').value)});
refreshBadges();showPage('dashboard');
</script>
</body>
</html>
